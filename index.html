<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <title>Street Furniture Editor</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600;700;800&family=Work+Sans:wght@300;400;600;800&display=swap');

    :root{
      --leftW: 320px;
      --rightW: 230px;
      --edgeGap: 14px;
      --radius: 22px;
      --glass: rgba(255,255,255,0.13);
      --glass-border: rgba(255,255,255,0.22);
      --accent: #a8edce;
      --accent2: #ffd6e0;
      --txt: #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; height: 100%;
      font-family: 'Noto Sans Thai', 'Work Sans', sans-serif;
      overflow: hidden; background: #000;
      cursor: url('color-arctic-lime-pointer.png'), auto;
    }
    button, .item-card, canvas, input, select, textarea, a {
      cursor: url('color-arctic-lime-pointer.png'), pointer !important;
    }
    body {
      background:
        linear-gradient(180deg, rgba(0,0,0,.28), rgba(0,0,0,.08)),
        url('Gemini_Generated_Image_eg5v3ceg5v3ceg5v.png') center/cover no-repeat;
    }

    /* ── CUSTOM SCROLLBAR — thin vertical pill ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.06); border-radius: 99px; margin: 10px 0; border: 1px solid rgba(255,255,255,0.06); }
    ::-webkit-scrollbar-thumb { background: rgba(200,200,210,0.45); border-radius: 99px; min-height: 40px; transition: background .25s; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(220,220,230,0.75); }
    ::-webkit-scrollbar-thumb:active { background: rgba(255,255,255,0.85); }

    /* ── START SCREEN ── */
    #startScreen {
      position: fixed; inset: 0; z-index: 99999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: url('Gemini_Generated_Image_xy1tbfxy1tbfxy1t.png') center/cover no-repeat;
      transition: opacity 0.9s ease, visibility 0.9s ease;
    }
    #startScreen.hidden { opacity:0; visibility:hidden; pointer-events:none; }
    #startScreen::before {
      content:''; position:absolute; inset:0;
      background: linear-gradient(160deg,rgba(0,0,0,.50) 0%,rgba(0,20,40,.60) 100%);
    }
    .start-content { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:24px; text-align:center; padding: 0 24px; }
    .start-logo { width:160px; filter:drop-shadow(0 4px 24px rgba(0,0,0,.6)); animation: floatLogo 3.2s ease-in-out infinite; }
    @keyframes floatLogo { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
    .start-title { font-size:30px; font-weight:800; color:#fff; line-height:1.3; text-shadow:0 2px 24px rgba(0,0,0,.5); }
    .start-sub { font-size:15px; color:rgba(255,255,255,.78); font-weight:400; }
    #btn_start {
      padding:15px 52px; border:none; border-radius:999px;
      background:linear-gradient(135deg,#a8edce 0%,#72d4f5 100%);
      color:#1a3a2e; font-size:17px; font-weight:800;
      font-family:'Noto Sans Thai',sans-serif;
      box-shadow:0 6px 36px rgba(100,220,180,.45),0 2px 8px rgba(0,0,0,.2);
      transition:transform .18s, box-shadow .18s; letter-spacing:.3px;
    }
    #btn_start:hover { transform:scale(1.07) translateY(-2px); box-shadow:0 14px 44px rgba(100,220,180,.55); }
    #btn_start:active { transform:scale(0.97); }
    .start-hint { font-size:12.5px; color:rgba(255,255,255,.48); }

    /* ── LAYOUT ── */
    #container { width:100vw; height:100vh; }
    canvas { display:block; }
    .pad-left  { padding-left:  calc(var(--leftW)  + var(--edgeGap)*2 + 4px); }
    .pad-right { padding-right: calc(var(--rightW) + var(--edgeGap)*2 + 4px); }

    /* ── SIDEBAR BASE ── */
    .sidebar {
      position:fixed; top:var(--edgeGap); bottom:var(--edgeGap);
      padding:14px 12px; display:flex; flex-direction:column; gap:8px;
      overflow-y:auto; overflow-x:hidden; z-index:9500; color:#fff;
      background:var(--glass); border:1px solid var(--glass-border);
      backdrop-filter:blur(16px) saturate(170%);
      -webkit-backdrop-filter:blur(16px) saturate(170%);
      border-radius:var(--radius);
      box-shadow:0 8px 36px rgba(0,0,0,.30), inset 0 1px 0 rgba(255,255,255,.12);
    }
    #leftbar  { left:var(--edgeGap);  width:var(--leftW); }
    #rightbar { right:var(--edgeGap); width:var(--rightW); }
    #rightbar .panel:first-of-type { margin-top:0; }

    .brand-inside { width: 100%; display: block; margin-bottom: 4px; filter: drop-shadow(0 2px 8px rgba(0,0,0,.45)); pointer-events: none; max-height: 68px; object-fit: contain; }

    /* ── HUD ── */
    .hud { position:fixed; left:30%; transform:translateX(-30%); bottom:calc(var(--edgeGap) + 6px); display:flex; gap:10px; z-index:9600; max-width:min(92vw,1200px); flex-wrap:wrap; justify-content:center; }

    /* ── GROUP TITLE ── */
    .group { display:flex; flex-direction:column; gap:4px; }
    .group-title { font-weight:700; font-size:12.5px; color:#fff; margin-top:10px; margin-bottom:3px; padding:6px 10px; border-radius:10px; background:rgba(255,255,255,.09); border-left:3px solid var(--accent); line-height:1.3; }

    /* ── ITEM GRID ── */
    .item-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
    .item-card { display:flex; flex-direction:column; align-items:center; gap:4px; padding:7px 4px 6px; border-radius:15px; font-size:10.5px; background:rgba(255,255,255,.09); color:#fff; border:1.5px solid rgba(255,255,255,.16); transition:all .15s ease; text-align:center; position:relative; overflow:hidden; }
    .item-card:hover { background:rgba(255,255,255,.19); border-color:rgba(255,255,255,.35); transform:translateY(-2px); box-shadow:0 5px 18px rgba(0,0,0,.18); }
    .item-card.active { background:linear-gradient(135deg,rgba(168,237,206,.32),rgba(114,212,245,.26)) !important; border-color:var(--accent) !important; box-shadow:0 0 0 2px rgba(168,237,206,.35),0 5px 18px rgba(0,0,0,.18); }
    .item-card .thumb { width:52px; height:52px; object-fit:contain; border-radius:10px; background:rgba(255,255,255,.05); }
    .item-card .thumb-placeholder { width:52px; height:52px; border-radius:10px; background:rgba(255,255,255,.07); display:flex; align-items:center; justify-content:center; font-size:22px; }
    .item-card .card-label { font-size:10px; line-height:1.25; word-break:break-word; opacity:.9; }
    .item-card .card-count { position:absolute; top:4px; right:5px; font-size:9.5px; font-weight:700; background:rgba(168,237,206,.88); color:#1a3a2e; border-radius:99px; padding:1px 5px; display:none; }
    .item-card .card-count.show { display:block; }
    .card-spinner { display:none; width:20px; height:20px; border:2.5px solid rgba(255,255,255,.18); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); }
    @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
    .item-card.loading .thumb, .item-card.loading .thumb-placeholder { opacity:.25; }
    .item-card.loading .card-spinner { display:block; }
    .item-card.load-error { border-color:rgba(255,100,100,.45) !important; }
    .item-card.load-error .card-err { display:block !important; }
    .card-err { display:none; position:absolute; bottom:3px; left:0; right:0; text-align:center; font-size:9px; color:#ff8888; }

    /* ── CONTROLS ── */
    .panel { display:flex; flex-direction:column; gap:7px; }
    .ctrl { padding:9px 12px; border:none; border-radius:14px; color:#fff; font-size:12.5px; font-family:'Noto Sans Thai','Work Sans',sans-serif; background:rgba(255,255,255,.11); text-align:left; border:1px solid rgba(255,255,255,.18); transition:all .14s ease; text-decoration:none; display:block; font-weight:500; }
    .ctrl:hover { background:rgba(255,255,255,.20); transform:translateY(-1px); box-shadow:0 3px 12px rgba(0,0,0,.14); }
    .ctrl:active { transform:translateY(0); }
    .ctrl.delete-btn { background:rgba(255,80,80,.17); border-color:rgba(255,100,100,.32); color:#ffc8c8; }
    .ctrl.delete-btn:hover { background:rgba(255,80,80,.30); color:#fff; }
    .ctrl.accent-btn { background:linear-gradient(135deg,rgba(168,237,206,.22),rgba(114,212,245,.18)); border-color:rgba(168,237,206,.38); color:var(--accent); font-weight:700; }
    .ctrl.accent-btn:hover { background:linear-gradient(135deg,rgba(168,237,206,.34),rgba(114,212,245,.26)); }
    .ctrl.music-on { background:rgba(168,237,206,.20); border-color:rgba(168,237,206,.50); color:#a8edce; font-weight:700; }

    /* ── STATUS ── */
    .status { margin-top:2px; padding:9px 12px; border-radius:14px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12); color:#f0f0f0; font-size:12px; line-height:1.6; }

    /* ── PROP PANEL ── */
    .prop-panel { display:none; flex-direction:column; gap:7px; background:rgba(0,0,0,.16); padding:9px; border-radius:13px; border:1px solid rgba(255,255,255,.09); }
    .prop-row { display:flex; align-items:center; justify-content:space-between; font-size:12px; gap:8px; }

    /* ── SECTION HEADER ── */
    .section-hdr { font-size:10.5px; font-weight:700; letter-spacing:.7px; text-transform:uppercase; color:var(--accent); opacity:.8; padding:0 2px; margin-top:2px; }

    /* ── RANGE ── */
    input[type="range"] { -webkit-appearance:none; appearance:none; width:100%; height:4px; border-radius:99px; background:rgba(255,255,255,.16); outline:none; margin:5px 0; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; appearance:none; width:17px; height:17px; border-radius:50%; background:linear-gradient(135deg,#a8edce,#72d4f5); box-shadow:0 2px 8px rgba(0,0,0,.28); border:2px solid rgba(255,255,255,.45); cursor:pointer; transition:transform .14s; }
    input[type="range"]::-webkit-slider-thumb:hover { transform:scale(1.22); }
    input[type="range"]::-moz-range-thumb { width:17px; height:17px; border-radius:50%; background:linear-gradient(135deg,#a8edce,#72d4f5); box-shadow:0 2px 8px rgba(0,0,0,.28); border:2px solid rgba(255,255,255,.45); cursor:pointer; }

    /* ── INPUTS ── */
    input[type="color"] { border:none; width:38px; height:24px; background:none; padding:0; border-radius:8px; }
    select, input[type="number"] { border-radius:10px; border:1px solid rgba(255,255,255,.20); background:rgba(0,0,0,.20); color:#fff; padding:5px 7px; outline:none; font-family:'Noto Sans Thai','Work Sans',sans-serif; font-size:11.5px; }
    .extra-input-label { font-size:11.5px; font-weight:600; color:#fff; opacity:.82; margin-bottom:3px; }
    .extra-input { width:100%; min-height:60px; resize:vertical; border-radius:13px; border:1px solid rgba(255,255,255,.20); background:rgba(0,0,0,.16); color:#fff; padding:8px 11px; outline:none; box-sizing:border-box; font-family:'Noto Sans Thai','Work Sans',sans-serif; font-size:12px; line-height:1.4; }
    .extra-input:focus { border-color:rgba(168,237,206,.45); background:rgba(0,0,0,.24); }
    .extra-input::placeholder { color:rgba(255,255,255,.36); }
    .link-note { font-size:10.5px; opacity:.60; line-height:1.45; }

    /* ── DIVIDER ── */
    .divider { height:1px; background:rgba(255,255,255,.09); border-radius:99px; margin:1px 0; }
    .rot-row { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
    .grid-row { display:grid; grid-template-columns:1fr 1fr; gap:5px; }

    /* ── CAM PILL ── */
    .bottom-hud { position:fixed; left:50%; transform:translateX(-50%); bottom:var(--edgeGap); z-index:9700; pointer-events:none; }
    .cam-pill { display:inline-flex; align-items:center; gap:7px; padding:7px 15px; border-radius:999px; background:rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.17); backdrop-filter:blur(8px); color:#fff; font-weight:700; font-size:12.5px; box-shadow:0 4px 20px rgba(0,0,0,.22); }

    /* ── CLOUDS ── */
    body::after { content:''; position:fixed; left:0; right:0; bottom:0; height:180px; background:url("images/clouds.png") center bottom/cover no-repeat; z-index:9000; pointer-events:none; }
  </style>
</head>
<body>

  <div id="startScreen">
    <div class="start-content">
      <img class="start-logo" src="images/logo.png" alt="LocalLoop BKK" onerror="this.style.display='none'">
      <div class="start-title">🌿 ออกแบบสวนสาธารณะ<br>ในฝันของคุณ</div>

      <button id="btn_start">✨ เริ่มต้น</button>
      <div class="start-hint">ดับเบิลคลิกบนพื้นที่เพื่อวางวัตถุ</div>
    </div>
  </div>

  <audio id="bgMusic" loop>
    <source src="https://edhwbkcmxgisqnznryhp.supabase.co/storage/v1/object/public/models/music.mp3" type="audio/mpeg">
  </audio>
  <div class="hud" id="hud"></div>

  <aside id="leftbar" class="sidebar">
    <div class="group" id="menu"></div>
  </aside>

  <aside id="rightbar" class="sidebar">
    <img class="brand-inside" src="images/logo.png" alt="LocalLoop BKK" onerror="this.style.display='none'">
    <div class="divider" style="margin-bottom:2px"></div>

    <div class="panel">
      <button class="ctrl" id="btn_music">🔇 เสียง: ปิด</button>
      <button class="ctrl" id="btn_snap">📷 บันทึกภาพหน้าจอ</button>
      <div>
        <div class="extra-input-label">ข้อเสนอแนะเพิ่มเติม</div>
        <textarea id="additionalInfo" class="extra-input" placeholder="พิมพ์ความคิดเห็นของคุณ..."></textarea>

      <button class="ctrl" id="btn_toggle_tree">🌳 ปิด ต้นไม้เดิม</button>

      <button class="ctrl" id="btn_undo">⟲ เลิกทำ</button>
    </div>

    <div class="divider"></div>

    <div class="panel" id="propPanelWrapper" style="display:none">
      <div class="status" style="margin-top:0;padding:8px 11px;">
        <b>✨ เลือก: <span id="selNameDisp" style="color:var(--accent)"></span></b>
      </div>
      <button class="ctrl delete-btn" id="btn_delete_sel">🗑 ลบวัตถุ</button>

        <div class="prop-row"><span>🎨 สี</span><input type="color" id="objColor" value="#ffffff"></div>
        <div class="prop-row" style="margin-top:5px"><span>📏 ขนาด</span><input type="number" id="objScale" step="0.1" value="1.0" style="width:64px"></div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="panel">
      <div class="section-hdr">⟳ การหมุน</div>
      <div class="rot-row">
        <button class="ctrl" id="btn_rot_holdL" style="text-align:center;padding:8px 4px;font-size:17px">⟲</button>
        <button class="ctrl" id="btn_rot_holdR" style="text-align:center;padding:8px 4px;font-size:17px">⟳</button>
      </div>
      <input id="rotSlider" type="range" min="0" max="360" value="0" step="1"/>
      <div class="status" style="margin-top:1px;padding:7px 11px;font-size:11.5px">
        <label style="display:flex;align-items:center;gap:5px;margin-bottom:4px">
          <span>แกน:</span>
          <select id="rotAxis" style="flex:1">
            <option value="z">หันซ้าย-ขวา (Z)</option>
            <option value="y">เงย-ก้ม (Y)</option>
            <option value="x">เอียง (X)</option>
          </select>
        </label>
        <div><b>มุม (<span id="axisLabel">Z</span>):</b> <span id="rotDeg" style="color:var(--accent)">0°</span></div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="panel">
      <div class="section-hdr">⊞ ตาราง</div>
      <div class="grid-row">
        <button class="ctrl" id="btn_grid_minus" style="text-align:center">➖</button>
        <button class="ctrl" id="btn_grid_plus"  style="text-align:center">➕</button>
      </div>
      <button class="ctrl" id="btn_grid_random" style="font-size:11.5px">🎲 สุ่มตาราง: ปิด</button>
    </div>

    <div class="status" id="statusBox">
      <div>📦 <b>วางทั้งหมด:</b> <span id="totalPlaced" style="color:var(--accent);font-weight:700">0</span></div>
      <div>⊞ <b>ขนาดตาราง:</b> <span id="gridSizeLabel">20</span> ช่อง</div>
    </div>
  </aside>

  <div id="container" class="pad-left pad-right"></div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.119.1/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.119.1/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader }    from 'https://unpkg.com/three@0.119.1/examples/jsm/loaders/GLTFLoader.js';
    import { DRACOLoader }   from 'https://unpkg.com/three@0.119.1/examples/jsm/loaders/DRACOLoader.js';

    /* ─ CONFIG ─ */
    const GAS_ID = 'AKfycbwjlpuyDMYdXLzPjvsbH3CCOm25nylo-HvLXhtIgpbd_nUKZzbiQI-DDhkbK2_fHQE_';
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/' + GAS_ID + '/exec';
    const SUPABASE_KEY    = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkaHdia2NteGdpc3Fuem5yeWhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg0MjkyMzAsImV4cCI6MjA4NDAwNTIzMH0.GUppQsGOW7ypR-skf8waGSX6ouxDUnnxkY5Ep-Tn1rQ';
    const SUPABASE_URL    = 'https://edhwbkcmxgisqnznryhp.supabase.co';
    const SUPABASE_BUCKET = 'submissions';
    const CITY_BASE_URL   = SUPABASE_URL + '/storage/v1/object/public/models/Models/';
    const MODEL_BASE_URL  = SUPABASE_URL + '/storage/v1/object/public/Model_Pravet/';
    const ICON_BASE_URL   = SUPABASE_URL + '/storage/v1/object/public/Model_Pravet/Icon/';

    /* ลบโค้ดลิงก์ Gsheet ออกแล้ว */

    /* ─ START SCREEN ─ */
    const startScreen = document.getElementById('startScreen');
    document.getElementById('btn_start').addEventListener('click', () => {
      startScreen.classList.add('hidden');
      bgMusic.play().then(() => {
        btnMusic.textContent = '🎵 เสียง: เปิด';
        btnMusic.classList.add('music-on');
        isMusicPlaying = true;
      }).catch(() => {});
    });

    /* ─ MUSIC ─ */
    const bgMusic  = document.getElementById('bgMusic');
    const btnMusic = document.getElementById('btn_music');
    let isMusicPlaying = false;
    bgMusic.volume = 0.4;
    btnMusic.addEventListener('click', () => {
      if (isMusicPlaying) {
        bgMusic.pause(); btnMusic.textContent = '🔇 เสียง: ปิด'; btnMusic.classList.remove('music-on');
      } else {
        bgMusic.play().then(() => { btnMusic.textContent = '🎵 เสียง: เปิด'; btnMusic.classList.add('music-on'); }).catch(e => console.warn(e));
      }
      isMusicPlaying = !isMusicPlaying;
    });

    /* ─ BG IMAGE ─ */
    const bgImg = new Image();
    bgImg.crossOrigin = 'anonymous';
    bgImg.src = 'Gemini_Generated_Image_eg5v3ceg5v3ceg5v.png';

    /* ─ THREE SETUP ─ */
    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 10, 10000000);
    camera.position.set(5000, -5000, 4000); camera.up.set(0, 0, 1);

    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    const renderer = new THREE.WebGLRenderer({
      antialias: !isMobile,
      alpha: true,
      logarithmicDepthBuffer: !isMobile,
      powerPreference: 'high-performance',
    });
    renderer.setSize(innerWidth, innerHeight);
    
    /* ปรับลด Pixel Ratio ให้ลื่นขึ้น */
    renderer.setPixelRatio(Math.min(devicePixelRatio, isMobile ? 1.0 : 1.5));
    
    renderer.setClearColor(0x000000, 0);
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.getElementById('container').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping=true; controls.dampingFactor=0.08; controls.screenSpacePanning=false;
    controls.minDistance=500; controls.maxDistance=500000; controls.maxPolarAngle=Math.PI/1.8;
    controls.enableZoom = false; 

    const _groundPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
    const _zoomRaycaster = new THREE.Raycaster();

    renderer.domElement.addEventListener('wheel', (e) => {
      e.preventDefault();
      const rect = renderer.domElement.getBoundingClientRect();
      const mouseNDC = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
      _zoomRaycaster.setFromCamera(mouseNDC, camera);
      const mouseWorld = new THREE.Vector3();
      const hit = _zoomRaycaster.ray.intersectPlane(_groundPlane, mouseWorld);
      const pivotPoint = hit ? mouseWorld : controls.target.clone();
      const delta = e.deltaMode === 1 ? e.deltaY * 30 : e.deltaY;
      const zoomFactor = Math.pow(1.001, delta); 
      const camToPivot   = new THREE.Vector3().subVectors(camera.position,  pivotPoint);
      const targToPivot  = new THREE.Vector3().subVectors(controls.target,  pivotPoint);
      const newCamPos    = new THREE.Vector3().addVectors(pivotPoint, camToPivot.multiplyScalar(zoomFactor));
      const newTarget    = new THREE.Vector3().addVectors(pivotPoint, targToPivot.multiplyScalar(zoomFactor));
      const newDist = newCamPos.distanceTo(newTarget);
      if (newDist >= controls.minDistance && newDist <= controls.maxDistance) {
        camera.position.copy(newCamPos);
        controls.target.copy(newTarget);
      }
      controls.update();
    }, { passive: false });

    }
    function dataURLtoBlob(dataurl) {
      const arr=dataurl.split(','), mime=arr[0].match(/:(.*?);/)[1], bstr=atob(arr[1]);
      let n=bstr.length; const u8=new Uint8Array(n);
      while(n--) u8[n]=bstr.charCodeAt(n);
      return new Blob([u8],{type:mime});
    }
    function capturePNG() {
      renderer.render(scene, camera);
      const canvas=document.createElement('canvas');
      canvas.width=renderer.domElement.width; canvas.height=renderer.domElement.height;
      const ctx=canvas.getContext('2d');
      if(bgImg.complete&&bgImg.naturalWidth>0){
        const w=canvas.width,h=canvas.height,r=Math.max(w/bgImg.naturalWidth,h/bgImg.naturalHeight);
        const nw=bgImg.naturalWidth*r,nh=bgImg.naturalHeight*r;
        ctx.drawImage(bgImg,(w-nw)/2,(h-nh)/2,nw,nh);
      }
      const g=ctx.createLinearGradient(0,0,0,canvas.height);
      g.addColorStop(0,'rgba(0,0,0,0.3)'); g.addColorStop(1,'rgba(0,0,0,0.1)');
      ctx.fillStyle=g; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(renderer.domElement,0,0);
      return canvas.toDataURL('image/png');

      city.traverse(n=>{
        if(!n.isMesh || !n.material) return;
        n.material = Array.isArray(n.material) ? n.material.map(m=>m.clone()) : n.material.clone();
        const mats = Array.isArray(n.material) ? n.material : [n.material];
        mats.forEach(mat => {
          mat.precision = 'mediump'; // ช่วยให้เรนเดอร์ลื่นขึ้น
          if(!mat.color) return;
          const r=mat.color.r, g=mat.color.g, b=mat.color.b;
          const nm = (n.name||'').toLowerCase();
          const isNamedTree = /tree|leaf|foliage|plant|grass|shrub|bush|canopy|crown|palm|hedge|flower/.test(nm);
          const isNamedWater = /water|pond|lake|river|pool/.test(nm);
          const isStrongGreen = g > r * 1.3 && g > b * 1.3 && g > 0.2;
          const isStrongBlue = b > r * 1.2 && b > g * 1.1 && b > 0.2;

          if (isNamedTree || isStrongGreen) {
            mat.color.setHex(0x4a8c3f); mat.roughness = 0.85; mat.metalness = 0.0;
          } else if (isNamedWater || isStrongBlue) {
            mat.color.setHex(0x6ab8d4); mat.roughness = 0.1; mat.metalness = 0.1;

            mat.color.setRGB(0.92, 0.92, 0.90); mat.roughness = 0.75; mat.metalness = 0.02;

    function getGroupTitleByKey(key){for(const[t,l]of Object.entries(GROUPS))if(l.includes(key))return t;return null;}

    /* computeBaseScale:
       หลัง obj.rotation.x = PI/2:
         size.x = กว้าง, size.y = ลึก (original Z), size.z = สูง (original Y)  */
    function computeBaseScale(obj,key){
      const t = ITEM_SCALE_M[key];
      const mul = MODEL_SCALE_MULTIPLIER[key] || 1.0;
      const size = new THREE.Box3().setFromObject(obj).getSize(new THREE.Vector3());
      if(!t){
        const ln = Math.max(size.x,size.y);
        return ln>0 ? ((2.0*UNIT_PER_M)/ln)*mul : 1;
      }
      if(t.tall){
        return size.z>0 ? ((t.tall*UNIT_PER_M)/size.z)*mul : 1;
      }
      const ln = Math.max(size.x,size.y);
      return ln>0 ? ((t.long*UNIT_PER_M)/ln)*mul : 1;
    }

    /* ── ทำโมเดลทุกชิ้นเป็นสีเทาอ่อน พร้อม shading และ shadow ที่ดี ──
       ลบ texture map เพื่อกันสีดั้งเดิมรั่ว แล้วทาสีเทาอ่อนพร้อม PBR ที่เหมาะสมต่อเงา  */
    function applyWhiteMaterial(root){
      root.traverse(n=>{
        if(!n.isMesh) return;
        const mats = Array.isArray(n.material) ? n.material : [n.material];
        mats.forEach(mat=>{
          if(!mat) return;
          // ลบ texture ทั้งหมดที่ส่งผลต่อสี
          if(mat.map)           { mat.map.dispose();           mat.map=null; }
          if(mat.normalMap)     { mat.normalMap.dispose();     mat.normalMap=null; }
          if(mat.roughnessMap)  { mat.roughnessMap.dispose();  mat.roughnessMap=null; }
          if(mat.metalnessMap)  { mat.metalnessMap.dispose();  mat.metalnessMap=null; }
          if(mat.aoMap)         { mat.aoMap.dispose();         mat.aoMap=null; }
          if(mat.emissiveMap)   { mat.emissiveMap.dispose();   mat.emissiveMap=null; }
          // ตั้งค่าสีเทาอ่อน (Light Gray) พร้อม shading และ shadow ที่ดี
          if(mat.color)     mat.color.setRGB(0.70, 0.70, 0.70);  // สีเทาอ่อน (ไม่ขาว)
          if(mat.emissive)  mat.emissive.setRGB(0,0,0);
          mat.roughness  = 0.65;   // เพิ่มความหยาบ เพื่อให้เงาชัดเจนขึ้น
          mat.metalness  = 0.0;    // ไม่มีความเป็นโลหะ
          mat.opacity    = 1;
          mat.transparent= false;
          mat.needsUpdate= true;
        });
      });
    }

    const loadModel=(name,filePath)=>{
      const encodedPath = filePath.split('/').map(segment => encodeURIComponent(segment)).join('/');
      const url=MODEL_BASE_URL+encodedPath;
      loader.load(url,(gltf)=>{
        const obj=gltf.scene; obj.rotation.x=Math.PI/2;
        const box=new THREE.Box3().setFromObject(obj);
        const center=box.getCenter(new THREE.Vector3()),min=box.min.clone();
        const wrap=new THREE.Group(); wrap.add(obj);
        obj.position.set(-center.x,-center.y,-min.z);
        wrap.traverse(n=>{if(n.isMesh){n.castShadow=true;n.receiveShadow=true;if(n.material)n.material=n.material.clone();}});
        applyWhiteMaterial(wrap);
        templates[name]=wrap;
      },undefined,err=>console.warn('Failed:',url,err));
    };

    /* ── LAZY LOADING QUEUE (max 3 concurrent) ── */
    const MODEL_QUEUE=[], loadingKeys=new Set(), failedKeys=new Set();
    let activeLoads=0;
    const MAX_CONCURRENT=isMobile?4:6;

    function processQueue(){
      while(activeLoads<MAX_CONCURRENT&&MODEL_QUEUE.length>0){
        const {key,filePath,resolve,reject}=MODEL_QUEUE.shift();
        activeLoads++;
        const encodedPath = filePath.split('/').map(segment => encodeURIComponent(segment)).join('/');
        const url=MODEL_BASE_URL+encodedPath;
        loader.load(url,(gltf)=>{
          const obj=gltf.scene; obj.rotation.x=Math.PI/2;
          const box=new THREE.Box3().setFromObject(obj);
          const center=box.getCenter(new THREE.Vector3()),min=box.min.clone();
          const wrap=new THREE.Group(); wrap.add(obj);
          obj.position.set(-center.x,-center.y,-min.z);
          wrap.traverse(n=>{
            if(n.isMesh){
              n.castShadow=!isMobile; n.receiveShadow=!isMobile;
              if(n.material) n.material=n.material.clone();
            }
          });
          applyWhiteMaterial(wrap);
          templates[key]=wrap;
          loadingKeys.delete(key);
          _setCardState(key,'ready');
          activeLoads--; processQueue(); resolve(wrap);
        },undefined,(err)=>{
          console.warn('Load failed:',url,err);
          loadingKeys.delete(key); failedKeys.add(key);
          _setCardState(key,'error');
          activeLoads--; processQueue(); reject(err);
        });
      }
    }

    function loadModelLazy(key){
      if(templates[key]) return Promise.resolve(templates[key]);
      if(failedKeys.has(key)){failedKeys.delete(key);} // allow retry
      if(loadingKeys.has(key)){
        return new Promise(r=>{ const t=setInterval(()=>{if(templates[key]){clearInterval(t);r(templates[key]);}else if(failedKeys.has(key)){clearInterval(t);r(null);}},200); });
      }
      const groupName=getGroupTitleByKey(key);
      const idx=(GROUPS[groupName]||[]).indexOf(key);
      const filePath=ITEM_PATH[key]||(groupName+'/'+(idx+1)+'.glb');
      loadingKeys.add(key);
      _setCardState(key,'loading');
      return new Promise((resolve,reject)=>{ MODEL_QUEUE.push({key,filePath,resolve,reject}); processQueue(); });
    }

    function _setCardState(key,state){
      const card=buttons[key]; if(!card)return;
      card.classList.remove('loading','load-error');
      if(state==='loading') card.classList.add('loading');
      if(state==='error')   card.classList.add('load-error');
    }

    /* โหลดเฉพาะตัวแรกของแต่ละกลุ่ม (preload ล่วงหน้า 18 ตัว) */
    Object.entries(GROUPS).forEach(([groupName,itemKeys])=>{
      if(itemKeys[0]) loadModelLazy(itemKeys[0]);
    });

    /* ─ BUILD LEFT MENU (grid + thumbnail) ─ */
    const menu=document.getElementById('menu');
    let activeKey=null;
    function makeSafeId(str){return btoa(unescape(encodeURIComponent(str))).replace(/=/g,'');}

    const makeCard=(key,groupName,itemIdx)=>{
      const label=key.split('::')[1];
      const safeId=makeSafeId(key);
      const numPrefix=groupName.split(' ')[0];
      const emoji=GROUP_EMOJI[numPrefix]||'📦';

      const card=document.createElement('div');
      card.className='item-card'; card.dataset.key=key;

      /* ── icon priority:
         1. ITEM_ICON[key]  — path รูปภาพรายตัว (/icon/xxx.png)
         2. emoji fallback  — GROUP_EMOJI ถ้าโหลดรูปไม่ได้               */
      function makeThumbEl(src, fallbackFn) {
        const img = document.createElement('img');
        img.className = 'thumb'; img.loading = 'lazy'; img.alt = label;
        img.src = src;
        img.onerror = fallbackFn;
        return img;
      }
      function makeEmojiEl(e) {
        const ph = document.createElement('div');
        ph.className = 'thumb-placeholder'; ph.textContent = e;
        return ph;
      }

      /* แปลง /icon/xxx.png → Supabase ICON_BASE_URL/xxx.png */
      const rawIcon = ITEM_ICON[key];
      const iconSrc = rawIcon
        ? rawIcon.startsWith('/icon/')
          ? ICON_BASE_URL + encodeURI(rawIcon.replace('/icon/', ''))
          : rawIcon
        : null;
      let thumbEl;
      if (iconSrc) {
        thumbEl = makeThumbEl(iconSrc, () => {
          card.replaceChild(makeEmojiEl(emoji), thumbEl);
        });
      } else {
        thumbEl = makeEmojiEl(emoji);
      }

      card.appendChild(thumbEl);

      const lbl=document.createElement('div'); lbl.className='card-label'; lbl.textContent=label;
      card.appendChild(lbl);

      const cnt=document.createElement('div'); cnt.className='card-count'; cnt.id='count_'+safeId; cnt.textContent='0';
      card.appendChild(cnt);

      /* loading spinner + error badge */
      const spn=document.createElement('div'); spn.className='card-spinner'; card.appendChild(spn);
      const err=document.createElement('div'); err.className='card-err'; err.textContent='⚠ โหลดไม่ได้ (แตะเพื่อลองใหม่)'; card.appendChild(err);

      card.addEventListener('click',()=>{
        if(card.classList.contains('loading')) return; // รอโหลดก่อน
        if(failedKeys.has(key)){
          loadModelLazy(key); // retry
          return;
        }
        if(!templates[key]){
          // เริ่มโหลดและเลือกไว้ล่วงหน้า
          activeKey=key;
          document.getElementById('selNameDisp').textContent=label+' ⏳';
          Object.values(buttons).forEach(b=>b.classList.remove('active'));
          card.classList.add('active'); setSelected(null);
          loadModelLazy(key).then(()=>{
            if(activeKey===key) document.getElementById('selNameDisp').textContent=label;
          });
          return;
        }
        activeKey=key;
        document.getElementById('selNameDisp').textContent=label;
        Object.values(buttons).forEach(b=>b.classList.remove('active'));
        card.classList.add('active'); setSelected(null);
      });
      buttons[key]=card; return card;
    };

    Object.entries(GROUPS).forEach(([title,items])=>{
      const wrap=document.createElement('div'); wrap.className='group';
      const titleEl=document.createElement('div'); titleEl.className='group-title'; titleEl.textContent=title;
      wrap.appendChild(titleEl);
      const grid=document.createElement('div'); grid.className='item-grid';
      items.forEach((k,i)=>grid.appendChild(makeCard(k,title,i)));
      wrap.appendChild(grid); menu.appendChild(wrap);
    });

    /* ─ PLACED OBJECTS ─ */
    const placedStack=[]; let totalPlaced=0;
    const updateCount=(key)=>{
      const safeId=makeSafeId(key);
      const el=document.getElementById('count_'+safeId);
      if(el){el.textContent=counts[key];el.classList.toggle('show',counts[key]>0);}
      document.getElementById('totalPlaced').textContent=totalPlaced;
    };

    document.getElementById('btn_undo').addEventListener('click',()=>{
      if(!placedStack.length)return;
      const obj=placedStack.pop(); const type=obj.userData.type;
      scene.remove(obj); counts[type]--; totalPlaced--; updateCount(type);
      if(selected===obj)setSelected(null);
    });

    document.getElementById('btn_snap').addEventListener('click',()=>{
      const a=document.createElement('a'); a.download='capture.png'; a.href=capturePNG(); a.click();
    });

    /* ─ SELECTION ─ */
    let selected=null,helper=null,ROT_AXIS='z';
    const rotSlider=document.getElementById('rotSlider');
    const colorInput=document.getElementById('objColor');

    function setSelected(obj){
      if(helper){scene.remove(helper);helper=null;}
      selected=obj||null;
      if(selected){
        document.getElementById('propPanelWrapper').style.display='block';
        helper=new THREE.BoxHelper(selected,0x62d0ff); scene.add(helper);
        rotSlider.value=Math.round(THREE.MathUtils.radToDeg(selected.rotation[ROT_AXIS]));
        document.getElementById('selNameDisp').textContent=selected.userData.type.split('::')[1]||selected.userData.type;
        document.getElementById('objScale').value=(selected.userData.userScaleMul||1).toFixed(2);
        let fc='#ffffff';
        selected.traverse(c=>{if(c.isMesh&&c.material?.color)fc='#'+c.material.color.getHexString();});
        colorInput.value=fc;
      } else { document.getElementById('propPanelWrapper').style.display='none'; }
    }

    colorInput.addEventListener('input',e=>{
      if(!selected)return;
      selected.traverse(c=>{if(c.isMesh&&c.material?.color)c.material.color.set(e.target.value);});
    });

    document.getElementById('btn_delete_sel').addEventListener('click',()=>{
      if(!selected)return;
      scene.remove(selected); if(helper)scene.remove(helper);
      const type=selected.userData.type; counts[type]--; totalPlaced--;
      updateCount(type); placedStack.splice(placedStack.indexOf(selected),1); setSelected(null);
    });

    document.getElementById('objScale').addEventListener('input',e=>{
      if(!selected)return;
      const mul=parseFloat(e.target.value);
      if(mul>0){selected.userData.userScaleMul=mul;selected.scale.setScalar((selected.userData.baseScale||1)*mul);if(helper)helper.update();}
    });

    /* ─ ROTATION ─ */
    const rotAxisSel=document.getElementById('rotAxis');
    const axisLabel=document.getElementById('axisLabel');
    const rotDegEl=document.getElementById('rotDeg');

    rotAxisSel.addEventListener('change',e=>{
      ROT_AXIS=e.target.value; axisLabel.textContent=ROT_AXIS.toUpperCase();
      if(selected){const d=Math.round(THREE.MathUtils.radToDeg(selected.rotation[ROT_AXIS]));rotSlider.value=d;rotDegEl.textContent=d+'°';}
    });
    rotSlider.addEventListener('input',e=>{
      const d=parseFloat(e.target.value); rotDegEl.textContent=Math.round(d)+'°';
      if(selected){selected.rotation[ROT_AXIS]=THREE.MathUtils.degToRad(d);if(helper)helper.update();}
    });

    /* ─ DRAG (mouse) ─ */
    let isDragging=false,dragItem=null;
    const raycaster=new THREE.Raycaster();

    renderer.domElement.addEventListener('mousedown',e=>{
      const m=getMouseNDC(e); raycaster.setFromCamera(m,camera);
      let pick=null;
      for(const h of raycaster.intersectObjects(scene.children,true)){
        let n=h.object;
        while(n&&n!==scene){if(n.userData.type){pick=n;break;}n=n.parent;}
        if(pick)break;
      }
      if(pick){isDragging=true;dragItem=pick;controls.enabled=false;setSelected(pick);}
    });
    renderer.domElement.addEventListener('mousemove',e=>{
      if(!isDragging||!dragItem)return;
      raycaster.setFromCamera(getMouseNDC(e),camera);
      const hit=raycaster.intersectObject(ground)[0];
      if(hit){dragItem.position.set(Math.round(hit.point.x/50)*50,Math.round(hit.point.y/50)*50,0);if(helper)helper.update();}
    });
    renderer.domElement.addEventListener('mouseup',()=>{isDragging=false;dragItem=null;controls.enabled=true;});

    /* ─ DRAG (touch / iOS) ─ */
    function getTouchNDC(touch){
      const r=renderer.domElement.getBoundingClientRect();
      return new THREE.Vector2(((touch.clientX-r.left)/r.width)*2-1,-((touch.clientY-r.top)/r.height)*2+1);
    }
    let touchDragItem=null, touchDragging=false;
    renderer.domElement.addEventListener('touchstart',e=>{
      if(e.touches.length!==1)return;
      const m=getTouchNDC(e.touches[0]); raycaster.setFromCamera(m,camera);
      let pick=null;
      for(const h of raycaster.intersectObjects(scene.children,true)){
        let n=h.object;
        while(n&&n!==scene){if(n.userData.type){pick=n;break;}n=n.parent;}
        if(pick)break;
      }
      if(pick){touchDragging=true;touchDragItem=pick;controls.enabled=false;setSelected(pick);}
    },{passive:true});
    renderer.domElement.addEventListener('touchmove',e=>{
      if(!touchDragging||!touchDragItem||e.touches.length!==1)return;
      e.preventDefault();
      raycaster.setFromCamera(getTouchNDC(e.touches[0]),camera);
      const hit=raycaster.intersectObject(ground)[0];
      if(hit){touchDragItem.position.set(Math.round(hit.point.x/50)*50,Math.round(hit.point.y/50)*50,0);if(helper)helper.update();}
    },{passive:false});
    renderer.domElement.addEventListener('touchend',()=>{touchDragging=false;touchDragItem=null;controls.enabled=true;},{passive:true});

    /* ─ PLACE (double-click mouse) ─ */
    function doPlace(ndcVec){
      if(!activeKey)return;
      if(!templates[activeKey]){
        loadModelLazy(activeKey).then(()=>{ /* user can try placing again */ });
        return;
      }
      raycaster.setFromCamera(ndcVec,camera);
      const hit=raycaster.intersectObject(ground)[0]; if(!hit)return;
      const md=templates[activeKey].clone(true);
      const base=computeBaseScale(md,activeKey);
      md.userData.baseScale=base; md.userData.userScaleMul=1; md.scale.setScalar(base);
      md.position.set(Math.round(hit.point.x/100)*100,Math.round(hit.point.y/100)*100,0);
      md.userData.type=activeKey;
      scene.add(md); placedStack.push(md); counts[activeKey]++; totalPlaced++;
      updateCount(activeKey); setSelected(md);
    }

    renderer.domElement.addEventListener('dblclick',e=>{ doPlace(getMouseNDC(e)); });

    /* ─ DOUBLE-TAP (iOS place) ─ */
    let lastTap=0;
    renderer.domElement.addEventListener('touchend',e=>{
      if(touchDragging) return;
      const now=Date.now();
      if(now-lastTap<320&&e.changedTouches.length===1){
        doPlace(getTouchNDC(e.changedTouches[0]));
      }
      lastTap=now;
    },{passive:true});

    /* ─ SUPABASE ─ */
    async function uploadToSupabase(blob){
      const now=new Date();
      const ts=[now.getFullYear(),String(now.getMonth()+1).padStart(2,'0'),String(now.getDate()).padStart(2,'0')].join('-')+'_'+
               [String(now.getHours()).padStart(2,'0'),String(now.getMinutes()).padStart(2,'0'),String(now.getSeconds()).padStart(2,'0')].join('-');
      const resp=await fetch(`${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/submission_${ts}.png`,{
        method:'POST',headers:{'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'image/png'},body:blob
      });
      if(!resp.ok)throw new Error('Supabase upload failed: '+resp.statusText);
      return `${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/submission_${ts}.png`;
    }

    async function logToGoogleSheets(publicUrl,info){
      await fetch(GOOGLE_SCRIPT_URL,{
        method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},
        body:JSON.stringify({total:totalPlaced,summary:publicUrl,details:counts,additionalInfo:info,pageLink:location.href,googleSheetLink:GOOGLE_SHEET_LINK,submittedAt:new Date().toISOString()})
      });
    }

    document.getElementById('btn_submit').addEventListener('click',async()=>{
      const btn=document.getElementById('btn_submit'),orig=btn.textContent;
      try{
        if(totalPlaced===0){alert('กรุณาวางวัตถุก่อนส่ง');return;}
        const info=document.getElementById('additionalInfo').value.trim();
        btn.textContent='⏳ กำลังประมวลผล...'; btn.disabled=true;
        const url=await uploadToSupabase(dataURLtoBlob(capturePNG()));
        btn.textContent='⏳ กำลังบันทึกข้อมูล...';
        await logToGoogleSheets(url,info);
        btn.textContent='✔ เสร็จสิ้น!';
        setTimeout(()=>{location.href='gallery.html';},1000);
      }catch(err){
        console.error(err); alert('เกิดข้อผิดพลาด: '+err.message);
        btn.textContent=orig; btn.disabled=false;
      }
    });

    window.addEventListener('resize',()=>{
      renderer.setSize(innerWidth,innerHeight);
      renderer.setPixelRatio(Math.min(devicePixelRatio, isMobile?1.5:2));
      camera.aspect=innerWidth/innerHeight;
      camera.updateProjectionMatrix();
    });

    let rotDir=0;
    document.getElementById('btn_rot_holdL').onmousedown=()=>rotDir=-1;
    document.getElementById('btn_rot_holdL').onmouseup=()=>rotDir=0;
    document.getElementById('btn_rot_holdR').onmousedown=()=>rotDir=1;
    document.getElementById('btn_rot_holdR').onmouseup=()=>rotDir=0;

    (function animate(){
      requestAnimationFrame(animate); stars.update(); controls.update();
      if(selected&&rotDir!==0){
        selected.rotation[ROT_AXIS]+=0.05*rotDir;
        const d=Math.round(THREE.MathUtils.radToDeg(selected.rotation[ROT_AXIS]));
        rotSlider.value=d; rotDegEl.textContent=d+'°'; if(helper)helper.update();
      }
      renderer.render(scene,camera);
    })();
  </script>
</body>
</html>
